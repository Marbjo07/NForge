name: Benchmarks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  benchmark:
    env:
      BUILD_TYPE: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push results to gh-pages
      pull-requests: write # comment regression alerts on PRs

    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/build/_deps
        key: ${{ runner.os }}-deps-bench-${{ hashFiles('CMakeLists.txt', 'benchmarks/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-bench-

    - name: Configure CMake with benchmarks
      run: |
        cmake -B ${{ github.workspace }}/build \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DNFORGE_BUILD_BENCHMARKS=on

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

    - name: Run benchmarks
      run: |
        ./build/benchmarks/nforge_benchmarks \
          --benchmark_repetitions=5 \
          --benchmark_report_aggregates_only=true \
          --benchmark_format=json \
          --benchmark_out=benchmark-results.json

    - name: Filter to mean only
      run: | # filter by mean suffix and remove suffix
        jq '.benchmarks = [.benchmarks[] | select(.aggregate_name == "mean") | .name = (.name | sub("/repetitions:\\d+$"; ""))]' \
          benchmark-results.json > filtered-results.json

    - name: Store benchmark results
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: googlecpp
        output-file-path: filtered-results.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        alert-threshold: '120%'
        comment-on-alert: true
        fail-on-alert: true
        summary-always: true
        benchmark-data-dir-path: dev/bench