name: CMake on a single platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Cache CMake dependencies
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/build/_deps
        key: ${{ runner.os }}-catch2-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-catch2-

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
    
    - name: Build
      id: build 
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
    
    - name: Test
      id: test
      # skip if build failed
      if: steps.build.outcome == 'success'
      working-directory: ${{ github.workspace }}/build
      # Continue so the reporter step always runs
      continue-on-error: true
      run: |
        ctest -C ${{ env.BUILD_TYPE }} \
          --output-on-failure \
          --output-junit test-results.xml

    # Publish results
    - name: Publish Test Results
      uses: mikepenz/action-junit-report@v5
      if: steps.build.outcome == 'success'
      with:
        report_paths: "${{ github.workspace }}/build/test-results.xml"
        # Distinguishes a test failure from a build failure in the UI
        check_name: "Test Results"
        fail_on_failure: true
        include_passed: true
        detailed_summary: true
        job_summary: true

    # Report outcome
    - name: Fail if build failed
      if: steps.build.outcome == 'failure'
      run: |
        echo "::error::Build failed, see the Build step above for compiler errors."
        exit 1

    - name: Fail if tests failed
      if: steps.test.outcome == 'failure'
      run: |
        echo "::error::Tests failed, see the Test Results check for a breakdown."
        exit 1