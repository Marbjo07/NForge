name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/build/_deps
        key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Configure CMake
      run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Build
      id: build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

    - name: Test
      id: test
      # skip if build failed
      if: steps.build.outcome == 'success'
      working-directory: ${{ github.workspace }}/build
      # Continue so the reporter step always runs
      continue-on-error: true
      run: |
        ctest -C ${{ env.BUILD_TYPE }} \
          --output-on-failure \
          --output-junit test-results.xml

    # Publish results
    - name: Publish Test Results
      uses: mikepenz/action-junit-report@v5
      if: steps.build.outcome == 'success'
      with:
        report_paths: "${{ github.workspace }}/build/test-results.xml"
        # Distinguishes a test failure from a build failure in the UI
        check_name: "Test Results"
        fail_on_failure: true
        include_passed: true
        detailed_summary: true
        job_summary: true

    # Report outcome
    - name: Fail if build failed
      if: steps.build.outcome == 'failure'
      run: |
        echo "::error::Build failed"
        exit 1

    - name: Fail if tests failed
      if: steps.test.outcome == 'failure'
      run: |
        echo "::error::Tests failed"
        exit 1

  benchmark:
    needs: build-and-test  # won't run if tests fail
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push results to gh-pages
      
    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/build/_deps
        key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Configure CMake with benchmarks
      run: |
        cmake -B ${{ github.workspace }}/build \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DNFORGE_BUILD_BENCHMARKS=on

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

    - name: Run benchmarks
      run: |
        ./build/benchmarks/nforge_benchmarks \
          --benchmark_format=json \
          --benchmark_out=benchmark-results.json

    - name: Store benchmark results
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: googlecpp
        output-file-path: benchmark-results.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        alert-threshold: '120%'
        comment-on-alert: true
        fail-on-alert: true
        benchmark-data-dir-path: dev/bench